<svg width="200" height="220" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">

  <g transform="translate(100, 105)">
    <!-- Solid leaf silhouette -->
    <path d="M0,-92
             C8,-88 22,-78 38,-60
             C54,-42 68,-18 70,8
             C72,34 64,60 46,76
             C32,88 14,94 0,94
             C-14,94 -32,88 -46,76
             C-64,60 -72,34 -70,8
             C-68,-18 -54,-42 -38,-60
             C-22,-78 -8,-88 0,-92 Z"
          fill="#0F6E56"/>

    <!-- Central vein as negative space -->
    <path d="M0,-86 C1,-50 1.5,10 2,88"
          fill="none" stroke="#1D9E75" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Left branch 1 -->
    <path d="M-1,-52 L-32,-52 L-32,-30"
          fill="none" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-32" cy="-30" r="5.5" fill="#1D9E75"/>
    <circle cx="-32" cy="-30" r="2.5" fill="#0F6E56"/>

    <!-- Right branch 1 -->
    <path d="M1,-20 L34,-20 L34,4"
          fill="none" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="34" cy="4" r="5.5" fill="#1D9E75"/>
    <circle cx="34" cy="4" r="2.5" fill="#0F6E56"/>

    <!-- Left branch 2 -->
    <path d="M-1,18 L-38,18 L-38,36"
          fill="none" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-38" cy="36" r="5.5" fill="#1D9E75"/>
    <circle cx="-38" cy="36" r="2.5" fill="#0F6E56"/>

    <!-- Right branch 2 -->
    <path d="M1,50 L28,50"
          fill="none" stroke="#1D9E75" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="28" cy="50" r="5.5" fill="#1D9E75"/>
    <circle cx="28" cy="50" r="2.5" fill="#0F6E56"/>

    <!-- Stem -->
    <path d="M0,92 L0,108 C0,112 -6,116 -10,118"
          fill="none" stroke="#0F6E56" stroke-width="3.5" stroke-linecap="round"/>
  </g>

</svg>
